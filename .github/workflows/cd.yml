name: CD — Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push API
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/legalens-api:${{ github.sha }}
          docker build -t $IMAGE -t ${{ secrets.ACR_NAME }}.azurecr.io/legalens-api:latest .
          docker push $IMAGE
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/legalens-api:latest

      - name: Build and push frontend
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/legalens-frontend:${{ github.sha }}
          docker build -t $IMAGE -t ${{ secrets.ACR_NAME }}.azurecr.io/legalens-frontend:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} ./frontend
          docker push $IMAGE
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/legalens-frontend:latest

      - name: Deploy API
        run: |
          az webapp config container set \
            --name ${{ secrets.API_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --container-image-name ${{ secrets.ACR_NAME }}.azurecr.io/legalens-api:${{ github.sha }}

      - name: Deploy frontend
        run: |
          az webapp config container set \
            --name ${{ secrets.FRONTEND_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --container-image-name ${{ secrets.ACR_NAME }}.azurecr.io/legalens-frontend:${{ github.sha }}

      - name: Health check
        run: |
          sleep 20
          curl -f ${{ secrets.API_URL }}/health
          echo "Deployed ${{ github.sha }} to ${{ inputs.environment }}"
