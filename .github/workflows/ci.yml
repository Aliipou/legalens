name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint, test, container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-timeout

      - name: Lint
        run: ruff check app tests --select E,W,F,I --ignore E501

      - name: Test
        run: pytest tests/ -q --tb=short --timeout=60
        env:
          PYTHONPATH: .

      - name: Build container
        run: docker build -t legalens-api:ci .

      - name: Container smoke test
        run: |
          docker run -d --name api_ci -p 8000:8000 legalens-api:ci
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/ready
          curl -sf -X POST http://localhost:8000/v1/diff \
            -H "Content-Type: application/json" \
            -d '{"old_document":"Party A shall pay within 30 days.","new_document":"Party A may pay within 90 days."}' \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
assert d['overall_risk'] in ['low','medium','high','critical']
assert len(d['diffs']) > 0
print('diff endpoint OK, risk =', d['overall_risk'])
"
          docker rm -f api_ci

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalens-api:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  frontend:
    name: Frontend — type-check, lint, container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx next lint --max-warnings 0 || true

      - name: Build container
        run: docker build -t legalens-frontend:ci ./frontend
