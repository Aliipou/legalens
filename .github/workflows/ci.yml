name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-timeout ruff

      - name: Lint
        run: ruff check app tests --select E,W,F,I

      - name: Test
        run: pytest tests/ --tb=short -q --timeout=120
        env:
          PYTHONPATH: .

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker build -t legalens:ci .

      - name: Smoke test
        run: |
          docker run -d --name legalens_ci -p 8000:8000 legalens:ci
          for i in $(seq 1 10); do curl -sf http://localhost:8000/health && break || sleep 3; done
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/ready
          docker stop legalens_ci

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalens:ci
          format: table
          exit-code: 0
          severity: CRITICAL
