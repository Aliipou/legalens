name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: legalens_test
          POSTGRES_USER: legalens
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U legalens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install
        run: pip install -r requirements.txt pytest pytest-asyncio httpx pytest-timeout ruff

      - name: Lint
        run: ruff check app tests --select E,W,F,I --ignore E501

      - name: Run all tests
        run: pytest tests/ -v --tb=short --timeout=120
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://legalens:testpass@localhost:5432/legalens_test

  # ── Frontend lint & type-check ───────────────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --prefer-offline

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ── Backend container ────────────────────────────────────────────────────────
  backend-docker:
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t legalens-api:ci .

      - name: Smoke test API
        run: |
          docker run -d --name api_ci \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -p 8000:8000 legalens-api:ci
          for i in $(seq 1 12); do
            curl -sf http://localhost:8000/health && echo "API up" && break
            sleep 3
          done
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/ready
          docker stop api_ci

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalens-api:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif

  # ── Frontend container ───────────────────────────────────────────────────────
  frontend-docker:
    runs-on: ubuntu-latest
    needs: frontend-check

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t legalens-frontend:ci ./frontend

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalens-frontend:ci
          format: table
          severity: CRITICAL
          exit-code: 0

  # ── Integration: full stack smoke test ───────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [backend-docker, frontend-docker]

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: |
          docker build -t legalens-api:ci .
          docker build -t legalens-frontend:ci ./frontend
          docker build -t legalens-nginx:ci ./nginx

      - name: Start stack
        run: |
          POSTGRES_PASSWORD=cipass docker compose up -d db api
          echo "Waiting for API..."
          for i in $(seq 1 20); do
            docker compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null && break
            sleep 3
          done

      - name: API integration tests
        run: |
          API=http://localhost:8000
          docker compose port api 8000
          curl -f "$(docker compose port api 8000 | sed 's/0.0.0.0/http:\/\/localhost/')/health"
          # Diff endpoint test
          curl -sf -X POST "$(docker compose port api 8000 | sed 's/0.0.0.0/http:\/\/localhost/')/v1/diff" \
            -H "Content-Type: application/json" \
            -d '{"old_document":"Party A shall pay within 30 days.","new_document":"Party A may pay within 90 days."}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['overall_risk'] in ['low','medium','high','critical'], 'bad risk'; print('✓ diff endpoint ok')"

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Cleanup
        if: always()
        run: docker compose down -v
