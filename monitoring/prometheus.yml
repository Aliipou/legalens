global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: legalens
    env: production

scrape_configs:
  - job_name: legalens_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /prometheus
    scrape_interval: 15s

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
